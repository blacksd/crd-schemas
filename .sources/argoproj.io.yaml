sources:
  - name: argo-cd
    type: helm
    repo: https://argoproj.github.io/argo-helm
    chart: argo-cd
    version: 7.9.1
    license: Apache-2.0
    homepage: https://argoproj.github.io/cd
    include:
      - Application
      - ApplicationSet
      - AppProject

  - name: argo-rollouts
    type: helm
    repo: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    version: 2.40.6
    license: Apache-2.0
    homepage: https://argoproj.github.io/rollouts
    include:
      - AnalysisRun
      - AnalysisTemplate
      - ClusterAnalysisTemplate
      - Experiment
      - Rollout

  - name: argo-workflows
    type: helm
    repo: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    version: 0.47.4
    license: Apache-2.0
    homepage: https://argoproj.github.io/workflows
    include:
      - ClusterWorkflowTemplate
      - CronWorkflow
      - Workflow
      - WorkflowArtifactGCTask
      - WorkflowEventBinding
      - WorkflowTaskResult
      - WorkflowTaskSet
      - WorkflowTemplate

  - name: argo-events
    type: helm
    repo: https://argoproj.github.io/argo-helm
    chart: argo-events
    version: 2.4.20
    license: Apache-2.0
    homepage: https://argoproj.github.io/argo-events
    include:
      - EventBus
      - EventSource
      - Sensor
