name: Tag Source Versions

on:
  workflow_run:
    workflows: ["Extract Schemas"]
    types: [completed]

concurrency:
  group: tag-versions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tag:
    name: Create version tags
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-tags: true

      - name: Install yq
        run: |
          YQ_VERSION=v4.45.1
          curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Configure git identity
        run: |
          git config user.name "github-actions[tag-versions]"
          git config user.email "github-actions[tag-versions]@users.noreply.github.com"

      - name: Verify SBOM and create missing tags
        run: |
          created=0
          for f in .sources/*.yaml; do
            count=$(yq ".sources | length" "$f")
            for i in $(seq 0 $((count - 1))); do
              name=$(yq ".sources[$i].name" "$f")
              version=$(yq ".sources[$i].version" "$f")
              if [ -z "$name" ] || [ -z "$version" ]; then
                continue
              fi

              tag="$name/$version"

              # Skip if tag already exists on remote
              if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
                continue
              fi

              # Verify the SBOM contains this source at the expected version
              sbom_version=$(jq -r --arg name "$name" '.components[] | select(.name == $name) | .version' sbom.cdx.json)
              if [ "$sbom_version" != "$version" ]; then
                echo "::error::SBOM mismatch for $name: expected $version, found ${sbom_version:-<missing>}"
                exit 1
              fi

              echo "Tagging: $tag"
              git tag -a "$tag" -m "Schemas extracted from $name $version"
              git push origin "$tag"
              created=$((created + 1))
            done
          done
          echo "Created $created new tag(s)"
