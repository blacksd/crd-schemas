name: Update CRD Schemas

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'cmd/**'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    name: Extract CRD Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: sources/**

      - name: Build tag list from changed sources
        id: changed
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          nix develop --command bash -c '
            tags=""
            for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
              if [ -f "$f" ]; then
                count=$(yq ".sources | length" "$f")
                for i in $(seq 0 $((count - 1))); do
                  name=$(yq ".sources[$i].name" "$f")
                  version=$(yq ".sources[$i].version" "$f")
                  if [ -n "$name" ] && [ -n "$version" ]; then
                    tags="$tags $name/$version"
                  fi
                done
              fi
            done
            echo "tags=$tags" >> "$GITHUB_OUTPUT"
          '

      - name: Build extract binary
        run: nix build

      - name: Run extraction
        run: nix develop --command ./result/bin/extract --sources=sources --output=schemas

      - name: Validate extracted schemas
        run: |
          failed=0

          # Well-formed JSON
          for f in $(find schemas -name '*.json' -not -name 'sbom.cdx.json'); do
            if ! jq empty "$f" 2>/dev/null; then
              echo "INVALID JSON: $f"
              failed=1
            fi
          done

          # Schema structure
          for f in $(find schemas -name '*.json' -not -name '*.provenance.json' -not -name 'sbom.cdx.json'); do
            if ! jq -e 'has("type") or has("properties") or has("allOf") or has("oneOf") or has("anyOf")' "$f" > /dev/null 2>&1; then
              echo "MISSING SCHEMA STRUCTURE: $f"
              failed=1
            fi
          done

          # Provenance fields
          for f in $(find schemas -name '*.provenance.json'); do
            if ! jq -e '.schema and .crd.group and .crd.kind and .crd.apiVersion and .source.name and .integrity.sha256' "$f" > /dev/null 2>&1; then
              echo "INVALID PROVENANCE: $f"
              failed=1
            fi
          done

          exit $failed

      - name: Commit updated schemas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schemas/
          if git diff --cached --quiet; then
            echo "No schema changes detected"
          else
            git commit -m "chore: update CRD schemas"
            git push
          fi

      - name: Create version tags
        if: steps.changed.outputs.tags != ''
        run: |
          for tag in ${{ steps.changed.outputs.tags }}; do
            source_name="${tag%%/*}"
            source_version="${tag##*/}"
            git tag -d "$tag" 2>/dev/null || true
            git push origin ":refs/tags/$tag" 2>/dev/null || true
            git tag -a "$tag" -m "Schemas extracted from $source_name $source_version"
            git push origin "$tag"
          done
