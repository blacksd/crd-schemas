name: Update CRD Schemas

on:
  push:
    branches: [main]
    paths:
      - '.sources/**'
  workflow_dispatch:

concurrency:
  group: extract-schemas
  cancel-in-progress: true

permissions:
  contents: write

env:
  EXTRACTOR_VERSION: v0.1.1

jobs:
  extract:
    name: Extract CRD Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download extractor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$EXTRACTOR_VERSION" \
            --repo blacksd/crd-schema-extractor \
            --pattern 'crd-schema-extractor_*_linux_amd64.tar.gz' \
            --output extractor.tar.gz
          tar -xzf extractor.tar.gz crd-schema-extractor
          chmod +x crd-schema-extractor
          mv crd-schema-extractor /usr/local/bin/
          rm extractor.tar.gz

      - name: Install yq
        run: |
          YQ_VERSION=v4.45.1
          curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Build tag list from changed sources
        id: changed
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          tags=""
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [ -f "$f" ]; then
              count=$(yq ".sources | length" "$f")
              for i in $(seq 0 $((count - 1))); do
                name=$(yq ".sources[$i].name" "$f")
                version=$(yq ".sources[$i].version" "$f")
                if [ -n "$name" ] && [ -n "$version" ]; then
                  tags="$tags $name/$version"
                fi
              done
            fi
          done
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Run extraction
        run: crd-schema-extractor extract .sources --output .

      - name: Validate extracted schemas
        run: |
          failed=0

          # Well-formed JSON
          for f in $(find . -name '*.json' \
            -not -path './.git/*' \
            -not -path './.sources/*' \
            -not -path './.github/*' \
            -not -name 'sbom.cdx.json' \
            -not -name 'source.schema.json' \
            -not -name 'renovate.json'); do
            if ! jq empty "$f" 2>/dev/null; then
              echo "INVALID JSON: $f"
              failed=1
            fi
          done

          # Schema structure
          for f in $(find . -name '*.json' \
            -not -path './.git/*' \
            -not -path './.sources/*' \
            -not -path './.github/*' \
            -not -name '*.provenance.json' \
            -not -name 'sbom.cdx.json' \
            -not -name 'source.schema.json' \
            -not -name 'renovate.json'); do
            if ! jq -e 'has("type") or has("properties") or has("allOf") or has("oneOf") or has("anyOf")' "$f" > /dev/null 2>&1; then
              echo "MISSING SCHEMA STRUCTURE: $f"
              failed=1
            fi
          done

          # Provenance fields
          for f in $(find . -name '*.provenance.json' \
            -not -path './.git/*' \
            -not -path './.sources/*' \
            -not -path './.github/*'); do
            if ! jq -e '.schema and .crd.group and .crd.kind and .crd.apiVersion and .source.name and .integrity.sha256' "$f" > /dev/null 2>&1; then
              echo "INVALID PROVENANCE: $f"
              failed=1
            fi
          done

          exit $failed

      - name: Commit updated schemas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all API group directories (DNS names contain dots, other root dirs are dot-prefixed)
          for dir in */; do
            git add "$dir"
          done
          git add sbom.cdx.json

          if git diff --cached --quiet; then
            echo "No schema changes detected"
          else
            git commit -m "chore: update CRD schemas"
            git push
          fi

      - name: Create version tags
        if: steps.changed.outputs.tags != ''
        run: |
          for tag in ${{ steps.changed.outputs.tags }}; do
            source_name="${tag%%/*}"
            source_version="${tag##*/}"
            git tag -d "$tag" 2>/dev/null || true
            git push origin ":refs/tags/$tag" 2>/dev/null || true
            git tag -a "$tag" -m "Schemas extracted from $source_name $source_version"
            git push origin "$tag"
          done
