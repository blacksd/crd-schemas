name: Tag Source Versions

on:
  push:
    branches: [main]
    paths:
      - '.sources/**'

concurrency:
  group: tag-versions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tag:
    name: Create version tags
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Install yq
        run: |
          YQ_VERSION=v4.45.1
          curl -sSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Build tag list and create tags
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [ -f "$f" ]; then
              count=$(yq ".sources | length" "$f")
              for i in $(seq 0 $((count - 1))); do
                name=$(yq ".sources[$i].name" "$f")
                version=$(yq ".sources[$i].version" "$f")
                if [ -n "$name" ] && [ -n "$version" ]; then
                  tag="$name/$version"
                  echo "Tagging: $tag"
                  git tag -d "$tag" 2>/dev/null || true
                  git push origin ":refs/tags/$tag" 2>/dev/null || true
                  git tag -a "$tag" -m "Schemas extracted from $name $version"
                  git push origin "$tag"
                fi
              done
            fi
          done
