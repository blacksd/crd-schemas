name: Update CRD Schemas

on:
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'cmd/**'
      - 'internal/**'
  pull_request:
    paths:
      - 'sources/**'
      - 'cmd/**'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    name: Extract CRD Schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Detect changed sources
        id: changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          changed_files=$(git diff --name-only HEAD~1 -- sources/)
          tags=""
          for f in $changed_files; do
            if [ -f "$f" ]; then
              count=$(yq '.sources | length' "$f")
              for i in $(seq 0 $((count - 1))); do
                name=$(yq ".sources[$i].name" "$f")
                version=$(yq ".sources[$i].version" "$f")
                if [ -n "$name" ] && [ -n "$version" ]; then
                  tags="$tags $name/$version"
                fi
              done
            fi
          done
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Run extraction
        run: go run ./cmd/extract/ --sources=sources --output=schemas

      - name: Commit updated schemas
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schemas/
          if git diff --cached --quiet; then
            echo "No schema changes detected"
          else
            git commit -m "chore: update CRD schemas"
            git push
          fi

      - name: Create version tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changed.outputs.tags != ''
        run: |
          for tag in ${{ steps.changed.outputs.tags }}; do
            source_name="${tag%%/*}"
            source_version="${tag##*/}"
            git tag -d "$tag" 2>/dev/null || true
            git push origin ":refs/tags/$tag" 2>/dev/null || true
            git tag -a "$tag" -m "Schemas extracted from $source_name $source_version"
            git push origin "$tag"
          done

      - name: Upload schemas artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: schemas
          path: schemas/
