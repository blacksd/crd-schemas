name: Validate

on:
  pull_request:
    paths:
      - 'sources/**'
      - 'source.schema.json'

jobs:
  validate-sources:
    name: Validate source configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Validate source configs against schema
        run: |
          nix develop --command bash -c '
            for f in sources/*.yaml sources/*.yml; do
              [ -f "$f" ] || continue
              echo "Validating $f..."
              check-jsonschema --schemafile source.schema.json "$f"
            done
          '
