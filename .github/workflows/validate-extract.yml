name: Validate

on:
  pull_request:

env:
  EXTRACTOR_VERSION: v0.1.1

jobs:
  validate-sources:
    name: Validate source configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Install check-jsonschema
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install check-jsonschema

      - name: Validate changed source configs against schema
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Validating $f..."
            check-jsonschema --schemafile source.schema.json "$f"
          done

  extract-schemas:
    name: Extract schemas
    needs: validate-sources
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Download extractor
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$EXTRACTOR_VERSION" \
            --repo blacksd/crd-schema-extractor \
            --pattern 'crd-schema-extractor_*_linux_amd64.tar.gz' \
            --output extractor.tar.gz
          tar -xzf extractor.tar.gz crd-schema-extractor
          chmod +x crd-schema-extractor
          mv crd-schema-extractor /usr/local/bin/
          rm extractor.tar.gz

      - name: Install check-jsonschema
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install check-jsonschema

      - name: Run extraction
        if: steps.changed-files.outputs.any_changed == 'true'
        run: crd-schema-extractor extract .sources --output .

      - name: Validate extracted schemas
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          changed_schemas=$(git diff --name-only -- '*.json' | grep -v '\.provenance\.json$' || true)
          changed_provenance=$(git diff --name-only -- '*.provenance.json' || true)

          # Warn on schemas that don't conform to JSON Schema meta-schema
          for f in $changed_schemas; do
            if ! check-jsonschema --check-metaschema "$f"; then
              echo "::warning file=$f::Schema does not fully conform to JSON Schema meta-schema"
            fi
          done

          # Warn on provenance files missing expected fields
          for f in $changed_provenance; do
            if ! jq -e '.schema and .crd.group and .crd.kind and .crd.apiVersion and .source.name and .integrity.sha256' "$f" > /dev/null 2>&1; then
              echo "::warning file=$f::Provenance file missing expected fields"
            fi
          done

      - name: Commit extracted schemas
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          git config user.name "github-actions[crd-extract]"
          git config user.email "github-actions[crd-extract]@users.noreply.github.com"

          # Stage all API group directories (DNS names contain dots, other root dirs are dot-prefixed)
          for dir in */; do
            git add "$dir"
          done
          git add sbom.cdx.json

          if git diff --cached --quiet; then
            echo "No schema changes detected"
          else
            git commit -m "chore: update CRD schemas"
            git push
          fi
