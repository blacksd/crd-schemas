name: Validate

on:
  pull_request:

env:
  EXTRACTOR_VERSION: v1.0.0

jobs:
  validate-sources:
    name: Validate source configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Install check-jsonschema
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install check-jsonschema

      - name: Validate changed source configs against schema
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Validating $f..."
            check-jsonschema --schemafile "https://raw.githubusercontent.com/blacksd/crd-schema-extractor/${EXTRACTOR_VERSION}/source.schema.json" "$f"
          done

  extract-schemas:
    name: Extract schemas
    needs: validate-sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changed source files
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files: .sources/**

      - name: Download extractor
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$EXTRACTOR_VERSION" \
            --repo blacksd/crd-schema-extractor \
            --pattern 'crd-schema-extractor_*_linux_amd64.tar.gz' \
            --output extractor.tar.gz
          tar -xzf extractor.tar.gz crd-schema-extractor
          chmod +x crd-schema-extractor
          mv crd-schema-extractor /usr/local/bin/
          rm extractor.tar.gz

      - name: Test source extraction
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for f in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Testing extraction for $f..."
            crd-schema-extractor extract "$f" --fetch-only
          done
